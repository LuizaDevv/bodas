<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Painel — Bodas de Diamante</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0e14;--panel:#111620;--card:#151b26;--card2:#10151e;--text:#f5f1e8;--soft:#c9c0ad;--muted:#8d8678;
  --line:rgba(245,241,232,.10);--gold:#e6c786;--gold2:#a98643;--ice:#d7edf6;--ok:#9fd8b4;
  --serif:'Fraunces',serif;--sans:'Inter',system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:radial-gradient(700px 420px at 20% -10%,rgba(230,199,134,.12),transparent 55%),radial-gradient(700px 420px at 100% 20%,rgba(215,237,246,.10),transparent 55%),var(--bg);color:var(--text);min-height:100vh}
.app{display:grid;grid-template-columns:280px 1fr;min-height:100vh}
.side{border-right:1px solid var(--line);padding:28px 20px;background:rgba(17,22,32,.72);backdrop-filter:blur(18px);position:sticky;top:0;height:100vh}
.brand{padding:18px;border:1px solid var(--line);border-radius:28px;background:linear-gradient(180deg,rgba(245,241,232,.05),rgba(245,241,232,.02))}
.kicker{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px}
h1{font-family:var(--serif);font-size:34px;line-height:1.02;font-weight:400;margin-bottom:12px}
.brand p{color:var(--soft);line-height:1.6;font-size:14px}
.nav{display:grid;gap:10px;margin-top:18px}.nav button{border:1px solid var(--line);background:transparent;color:var(--soft);border-radius:16px;padding:15px 16px;text-align:left;font-weight:700;cursor:pointer;transition:.25s}.nav button.active,.nav button:hover{background:rgba(230,199,134,.12);border-color:rgba(230,199,134,.32);color:var(--text)}
.main{padding:28px;max-width:1180px;width:100%;margin:0 auto}.topbar{display:flex;justify-content:space-between;align-items:flex-end;gap:18px;margin-bottom:22px}h2{font-family:var(--serif);font-size:38px;font-weight:400}.topbar p{color:var(--muted);margin-top:6px}
.panel{display:none}.panel.active{display:block}.card,.message-card{border:1px solid var(--line);border-radius:26px;background:linear-gradient(180deg,rgba(245,241,232,.055),rgba(245,241,232,.018));box-shadow:0 20px 70px rgba(0,0,0,.18)}.card{padding:20px}.toolbar{display:flex;gap:10px;align-items:center;justify-content:space-between;margin-bottom:16px}.search,select{width:100%;border:1px solid var(--line);background:rgba(11,14,20,.55);color:var(--text);border-radius:16px;padding:15px 16px;font-family:var(--sans);outline:none}.search:focus,select:focus{border-color:rgba(230,199,134,.55)}.pill{display:inline-flex;align-items:center;border:1px solid var(--line);border-radius:999px;padding:7px 11px;color:var(--soft);font-size:12px;font-weight:700;white-space:nowrap}.pill.ok{border-color:rgba(159,216,180,.35);color:var(--ok);background:rgba(159,216,180,.08)}.muted{color:var(--muted)}
.table-wrap{overflow:auto}.table{width:100%;border-collapse:collapse;min-width:760px}.table th{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);text-align:left;padding:14px 12px;border-bottom:1px solid var(--line)}.table td{padding:16px 12px;border-bottom:1px solid var(--line);vertical-align:top;color:var(--soft);line-height:1.55}.table strong{color:var(--text)}.mini-btn,.btn{border:1px solid rgba(230,199,134,.28);background:rgba(230,199,134,.10);color:var(--gold);border-radius:999px;padding:10px 13px;font-weight:800;cursor:pointer}.btn.gold{background:linear-gradient(135deg,#f3dfaa,var(--gold));color:#14100c;border:none}.mini-btn{font-size:12px;margin:2px 0}
.grid2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px}.message-card{padding:24px;position:relative;overflow:hidden}.message-card:before{content:"";position:absolute;inset:12px;border:1px solid rgba(230,199,134,.20);border-radius:20px;pointer-events:none}.message-card .from{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:18px;position:relative}.message-card h3{font-family:var(--serif);font-size:24px;font-weight:400;color:var(--text)}.message-card p{font-family:var(--serif);font-size:21px;line-height:1.55;color:var(--soft);position:relative}.empty{color:var(--muted);padding:26px;text-align:center}.preview{background:#efe7d7;color:#2b241c;border:0;border-radius:24px;min-height:620px;display:flex;align-items:stretch;justify-content:center;padding:18px}.pdfpage{width:100%;min-height:580px;padding:42px 36px;text-align:center;display:flex;flex-direction:column;justify-content:space-between;border:1.5px solid #d4b46f;margin:0;border-radius:0;background:#f8f1e4;position:relative;overflow:hidden}.pdfpage:before,.pdfpage:after{content:"";position:absolute;width:122px;height:122px;pointer-events:none}.pdfpage:before{top:16px;left:16px;border-top:1px solid rgba(54,48,39,.58);border-left:1px solid rgba(54,48,39,.58)}.pdfpage:after{right:16px;bottom:16px;border-right:1px solid rgba(54,48,39,.58);border-bottom:1px solid rgba(54,48,39,.58)}.pdfpage .small{letter-spacing:.34em;text-transform:uppercase;color:#a27a2d;font-size:12px;font-weight:800}.pdfpage h2{font-family:var(--serif);font-size:42px;font-weight:500;line-height:1.08;margin:26px 0;color:#2f261e;letter-spacing:-.03em}.pdfpage blockquote{font-family:var(--serif);font-size:33px;line-height:1.5;margin:46px auto 38px;color:#3b2f25;max-width:800px;font-weight:400}.pdfpage .sign{font-family:var(--serif);font-size:28px;line-height:1.18;color:#a27a2d}.pdfpage .date{margin-top:34px;color:#776b5b;font-size:16px;font-weight:500}.pdf-layout{grid-template-columns:420px 1fr}.pdf-select-card{align-self:start}.actions-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
@media(max-width:860px){.app{display:block}.side{position:relative;height:auto;border-right:0;border-bottom:1px solid var(--line);padding:18px 16px}.brand{padding:16px;border-radius:22px}h1{font-size:29px}.nav{display:flex;overflow-x:auto;gap:8px;padding-bottom:4px}.nav button{white-space:nowrap;padding:12px 14px}.main{padding:18px 14px 30px}.topbar{display:block}h2{font-size:32px}.grid2,.pdf-layout{grid-template-columns:1fr}.table{min-width:0}.table thead{display:none}.table,.table tbody,.table tr,.table td{display:block;width:100%}.table tr{border:1px solid var(--line);border-radius:20px;margin-bottom:12px;padding:10px;background:rgba(245,241,232,.025)}.table td{border:0;padding:8px 6px}.table td:before{content:attr(data-label);display:block;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-bottom:4px;font-weight:800}.toolbar{display:grid}.message-card{padding:22px}.message-card .from{display:block}.message-card .from .mini-btn{margin-top:10px}.message-card p{font-size:20px}.preview{min-height:520px;padding:10px}.pdfpage{min-height:500px;padding:34px 18px}.pdfpage:before,.pdfpage:after{width:90px;height:90px}.pdfpage h2{font-size:34px}.pdfpage .small{font-size:10px;letter-spacing:.24em}.pdfpage blockquote{font-size:25px;margin:34px 0}.pdfpage .sign{font-size:22px}.pdfpage .date{font-size:14px}}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand">
      <div class="kicker">Painel RSVP</div>
      <h1>Bodas de Diamante</h1>
      <p>Presenças, mensagens e PDFs decorados para João Francisco & Quitéria.</p>
    </div>
    <div class="nav">
      <button class="active" data-tab="confirmados">Confirmados</button>
      <button data-tab="mensagens">Mensagens</button>
      <button data-tab="pdfs">PDFs</button>
    </div>
  </aside>
  <main class="main">
    <div class="topbar">
      <div>
        <h2 id="pageTitle">Confirmados</h2>
        <p id="pageSub">Lista de famílias e participantes.</p>
      </div>
    </div>

    <section id="confirmados" class="panel active">
      <div class="card">
        <div class="toolbar">
          <input id="searchInput" class="search" placeholder="Buscar por família ou participante..." oninput="render()">
          <span class="pill" id="countRows">0 registros</span>
        </div>
        <div class="table-wrap">
          <table class="table">
            <thead><tr><th>Família</th><th>Participantes</th><th>Qtd.</th><th>Almoço</th><th>Mensagem</th><th>Ações</th></tr></thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>
    </section>

    <section id="mensagens" class="panel">
      <div class="grid2" id="messagesGrid"></div>
    </section>

    <section id="pdfs" class="panel">
      <div class="grid2 pdf-layout">
        <div class="card pdf-select-card">
          <div class="kicker">Mensagem decorada</div>
          <div class="toolbar" style="margin-top:14px">
            <select id="pdfSelect" class="search" onchange="renderPDFPreview()"></select>
          </div>
          <div class="actions-row">
            <button class="btn gold" onclick="printSelectedPDF()">Baixar/Imprimir PDF</button>
          </div>
        </div>
        <div class="preview"><div class="pdfpage" id="pdfPreview"></div></div>
      </div>
    </section>
  </main>
</div>
<script>
const SUPABASE_URL = "https://yssmxwenzecgtwbilcmn.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_MVwXYm50sunwbC0jWrpbmA_HyKN-WFE";
const TABLE_NAME = "confirmacoes_bodas";

let data = [];
let sb = null;

const tabs = {
  confirmados:['Confirmados','Lista de famílias e participantes.'],
  mensagens:['Mensagens','Recados enviados para o casal.'],
  pdfs:['PDFs','Cartões decorados com as mensagens.']
};

function supabaseConfigurado(){
  return SUPABASE_URL.startsWith('https://') &&
         SUPABASE_URL.includes('.supabase.co') &&
         SUPABASE_ANON_KEY &&
         SUPABASE_ANON_KEY.length > 40 &&
         window.supabase;
}

if (supabaseConfigurado()){
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
} else {
  data = [
    {
      id:'exemplo-1',
      familia:'Família Oliveira',
      quantidade:3,
      participantes:['Ana Oliveira','Carlos Oliveira','Beatriz Oliveira'],
      participacao:'Sim, participaremos da missa e do almoço',
      mensagem:'Que alegria celebrar uma história tão linda. Que Deus continue abençoando essa união e enchendo a vida de vocês de amor.',
      created_at:'2026-05-31T12:00:00'
    },
    {
      id:'exemplo-2',
      familia:'Família Martins',
      quantidade:2,
      participantes:['Rita Martins','Paulo Martins'],
      participacao:'Sim, participaremos da missa e do almoço',
      mensagem:'Vocês são exemplo de carinho, fé e companheirismo. Parabéns por esses 60 anos de amor.',
      created_at:'2026-05-31T12:00:00'
    }
  ];
}

document.querySelectorAll('.nav button').forEach(btn => btn.onclick = () => {
  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById(btn.dataset.tab).classList.add('active');
  pageTitle.textContent = tabs[btn.dataset.tab][0];
  pageSub.textContent = tabs[btn.dataset.tab][1];
  render();
});

function escapeHtml(str){
  return String(str || '').replace(/[&<>'"]/g, c => ({
    '&':'&amp;',
    '<':'&lt;',
    '>':'&gt;',
    "'":'&#39;',
    '"':'&quot;'
  }[c]));
}

function formatDate(value){
  if (!value) return '';
  const d = new Date(value);
  if (Number.isNaN(d.getTime())) return '';
  return d.toLocaleDateString('pt-BR');
}

function normalizar(row){
  return {
    id: row.id,
    familia: row.familia || '',
    quantidade: row.quantidade || row.qtd || 0,
    participantes: Array.isArray(row.participantes) ? row.participantes : (row.nomes || []),
    participacao: row.participacao || row.almoco || '',
    mensagem: row.mensagem || '',
    created_at: row.created_at || row.data || ''
  };
}

async function carregarDados(){
  if (!sb){
    render();
    return;
  }

  countRows.textContent = 'Carregando...';

  const { data: rows, error } = await sb
    .from(TABLE_NAME)
    .select('*')
    .order('created_at', { ascending:false });

  if (error){
    console.error(error);
    tbody.innerHTML = '<tr><td colspan="6" class="empty">Erro ao carregar. Confira URL, chave, tabela e políticas do Supabase.</td></tr>';
    messagesGrid.innerHTML = '<div class="card empty">Erro ao carregar mensagens.</div>';
    pdfPreview.innerHTML = '<div class="empty">Erro ao carregar PDF.</div>';
    return;
  }

  data = (rows || []).map(normalizar);
  render();
}

function render(){
  let q = (document.getElementById('searchInput')?.value || '').toLowerCase();
  let filtered = data.filter(x => (
    (x.familia || '') + ' ' + (x.participantes || []).join(' ') + ' ' + (x.participacao || '')
  ).toLowerCase().includes(q));

  countRows.textContent = filtered.length + ' registros';

  tbody.innerHTML = filtered.map(x => {
    const i = data.indexOf(x);
    const nomes = (x.participantes || []).map(n => `<div>${escapeHtml(n)}</div>`).join('');
    return `<tr>
      <td data-label="Família"><strong>${escapeHtml(x.familia)}</strong><br><span class="muted">${formatDate(x.created_at)}</span></td>
      <td data-label="Participantes">${nomes}</td>
      <td data-label="Qtd."><span class="pill">${escapeHtml(x.quantidade)}</span></td>
      <td data-label="Almoço">${escapeHtml(x.participacao)}</td>
      <td data-label="Mensagem">${x.mensagem ? '<span class="pill ok">Sim</span>' : '<span class="muted">Não</span>'}</td>
      <td data-label="Ações">
        ${x.mensagem ? `<button class="mini-btn" onclick="goPDF(${i})">PDF</button>` : ''}
        <button class="mini-btn" onclick="removeItem(${i})">Excluir</button>
      </td>
    </tr>`;
  }).join('') || '<tr><td colspan="6" class="empty">Nenhum registro encontrado.</td></tr>';

  const mensagens = data.filter(x => x.mensagem);
  messagesGrid.innerHTML = mensagens.map(x => {
    const i = data.indexOf(x);
    return `<div class="message-card">
      <div class="from">
        <div>
          <h3>${escapeHtml(x.familia)}</h3>
          <div class="muted">${escapeHtml((x.participantes || []).join(', '))}</div>
        </div>
        <button class="mini-btn" onclick="goPDF(${i})">Gerar PDF</button>
      </div>
      <p>“${escapeHtml(x.mensagem)}”</p>
    </div>`;
  }).join('') || '<div class="card empty">Nenhuma mensagem recebida ainda.</div>';

  pdfSelect.innerHTML = mensagens.map(x => {
    const i = data.indexOf(x);
    return `<option value="${i}">${escapeHtml(x.familia)}</option>`;
  }).join('');

  renderPDFPreview();
}

function renderPDFPreview(){
  let sel = document.getElementById('pdfSelect');
  let idx = sel && sel.value !== '' ? Number(sel.value) : data.findIndex(x => x.mensagem);
  let x = data[idx];

  pdfPreview.innerHTML = x ? `
    <div>
      <div class="small">Bodas de Diamante</div>
      <h2>João Francisco & Quitéria</h2>
      <div class="small">Mensagem de ${escapeHtml(x.familia)}</div>
    </div>
    <div>
      <blockquote>“${escapeHtml(x.mensagem || '')}”</blockquote>
      <div class="sign">Com carinho,<br>${escapeHtml((x.participantes || []).join(', '))}</div>
    </div>
    <div class="date">28 de Junho de 2026</div>
  ` : '<div class="empty">Selecione uma mensagem.</div>';
}

function goPDF(i){
  document.querySelector('[data-tab="pdfs"]').click();
  setTimeout(() => {
    pdfSelect.value = i;
    renderPDFPreview();
  }, 50);
}

async function removeItem(i){
  const item = data[i];
  if (!item) return;

  if (!confirm('Deseja excluir esta confirmação?')) return;

  if (sb && item.id){
    const { error } = await sb.from(TABLE_NAME).delete().eq('id', item.id);
    if (error){
      console.error(error);
      alert('Não foi possível excluir. Confira a política de DELETE no Supabase.');
      return;
    }
  }

  data.splice(i, 1);
  render();
}

function printSelectedPDF(){
  let content = pdfPreview.innerHTML;
  if (!content || content.includes('Selecione uma mensagem')) {
    alert('Selecione uma mensagem antes.');
    return;
  }

  let w = window.open('', '_blank');
  w.document.write(`<html><head><title>Mensagem Bodas</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
  @page{size:A4 portrait;margin:0}
  *{box-sizing:border-box}
  body{margin:0;background:#efe7d7;color:#2f261e;font-family:Inter,system-ui,sans-serif}
  .page{width:210mm;height:297mm;padding:14mm;background:#efe7d7;display:flex}
  .message-sheet{width:100%;height:100%;padding:18mm 14mm;text-align:center;border:1.5px solid #d4b46f;background:#f8f1e4;position:relative;display:flex;flex-direction:column;justify-content:space-between;overflow:hidden}
  .message-sheet:before,.message-sheet:after{content:"";position:absolute;width:36mm;height:36mm}
  .message-sheet:before{top:8mm;left:8mm;border-top:1px solid rgba(54,48,39,.58);border-left:1px solid rgba(54,48,39,.58)}
  .message-sheet:after{right:8mm;bottom:8mm;border-right:1px solid rgba(54,48,39,.58);border-bottom:1px solid rgba(54,48,39,.58)}
  .small{letter-spacing:.34em;text-transform:uppercase;color:#a27a2d;font-size:12px;font-weight:800}
  h2{font-family:Fraunces,serif;font-size:44px;line-height:1.06;font-weight:500;margin:22px 0;color:#2f261e;letter-spacing:-.03em}
  blockquote{font-family:Fraunces,serif;font-size:33px;line-height:1.5;margin:45px auto 36px;color:#3b2f25;max-width:170mm;font-weight:400}
  .sign{font-family:Fraunces,serif;font-size:28px;line-height:1.2;color:#a27a2d}
  .date{margin-top:25px;color:#776b5b;font-size:16px;font-weight:500}
  @media print{body{background:#efe7d7}.page{page-break-after:always}}
  </style></head><body><div class="page"><div class="message-sheet">${content}</div></div><script>window.onload=()=>window.print()<\/script></body></html>`);
  w.document.close();
}

carregarDados();
</script>
</body>
</html>
